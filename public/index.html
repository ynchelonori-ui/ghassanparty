<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Watch Party</title>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      font-size: 16px;
    }

    video {
      width: 300px;
      margin: 10px;
      border-radius: 10px;
      background: black;
    }
  </style>
</head>
<body>

<h1>🎬 Watch Party</h1>

<!-- دخول غرفة -->
<input id="roomInput" placeholder="room1">
<button onclick="joinRoom()">Join</button>

<hr>

<!-- فيديو -->
<h3>📺 Screen Share</h3>

<p>🟢 Your Screen</p>
<video id="localVideo" autoplay muted playsinline></video>

<p>🔴 Friend Screen</p>
<video id="remoteVideo" autoplay playsinline muted></video>

<br>
<button onclick="startScreen()">Share Screen</button>

<hr>

<!-- شات -->
<h3>💬 Chat</h3>

<input id="msgInput" placeholder="message">
<button onclick="sendMessage()">Send</button>

<ul id="chatBox"></ul>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
