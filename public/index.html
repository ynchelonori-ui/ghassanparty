<!DOCTYPE html>
<html>
<head>
  <title>Watch Party</title>
  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    video {
      width: 300px;
      margin: 10px;
      border-radius: 10px;
      background: black;
    }
  </style>
</head>
<body>

<h1>🎬 Watch Party</h1>

<input id="roomInput" placeholder="Room ID">
<button id="joinBtn">Join</button>

<hr>

<h3>📺 Screen Share</h3>

<p>🟢 Your Screen</p>
<video id="localVideo" autoplay muted playsinline></video>

<p>🔴 Friend Screen</p>
<video id="remoteVideo" autoplay playsinline muted></video>

<br>
<button id="screenBtn">Share Screen</button>

<hr>

<h3>💬 Chat</h3>

<input id="msgInput" placeholder="Type message">
<button id="sendBtn">Send</button>

<ul id="chatBox"></ul>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
